<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnowCap.js — Procedural Snow for Any DOM Element</title>
    <meta name="description" content="Topography-aware procedural snow caps for any DOM element. Zero deps. Vanilla JS.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19"></script>
    <script src="snow-cap.js"></script>

    <style>
        :root {
            --bg-0: #07090d;
            --bg-1: #0d1218;
            --bg-2: #131a23;
            --line: rgba(255, 255, 255, 0.06);
            --line-strong: rgba(255, 255, 255, 0.12);
            --text: #e6edf3;
            --text-dim: #8b95a3;
            --text-faint: #5a6573;
            --accent: #7adfff;
            --accent-dim: rgba(122, 223, 255, 0.18);
            --danger: #ff6b6b;
            --obj: #2a313b;
            --obj-border: #3a424d;
            --radius: 10px;
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            height: 100%;
            background: var(--bg-0);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        /* ---------- Background ambience ---------- */
        #ambient {
            position: fixed; inset: 0; z-index: 0; overflow: hidden;
            background:
                radial-gradient(1200px 800px at 80% -10%, rgba(122, 223, 255, 0.06), transparent 60%),
                radial-gradient(900px 700px at -10% 110%, rgba(80, 130, 255, 0.05), transparent 60%),
                linear-gradient(180deg, #06080c, #0a0d12);
            pointer-events: none;
        }
        #ambient canvas { display: block; width: 100%; height: 100%; }

        /* ---------- App layout ---------- */
        #app {
            position: relative;
            display: grid;
            grid-template-rows: 56px 1fr auto;
            grid-template-columns: 240px 1fr;
            grid-template-areas:
                "topbar topbar"
                "sidebar workspace"
                "codebar codebar";
            height: 100vh;
            z-index: 1;
        }

        /* ---------- Topbar ---------- */
        #topbar {
            grid-area: topbar;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 18px;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(20, 26, 35, 0.7), rgba(13, 18, 24, 0.7));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .brand {
            display: flex; align-items: center; gap: 10px;
            font-weight: 700; letter-spacing: -0.01em;
        }
        .brand-mark {
            width: 28px; height: 28px;
            display: grid; place-items: center;
            border-radius: 8px;
            background: linear-gradient(135deg, #1a2330, #0e141c);
            border: 1px solid var(--line-strong);
            color: var(--accent);
        }
        .brand-name { font-size: 14px; }
        .brand-ver {
            font-size: 11px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace;
            padding: 2px 7px; border: 1px solid var(--line); border-radius: 999px;
        }
        .topbar-spacer { flex: 1; }

        .btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--line-strong);
            color: var(--text);
            padding: 7px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: background .15s ease, border-color .15s ease, color .15s ease, transform .05s ease;
            display: inline-flex; align-items: center; gap: 6px;
            font-family: inherit;
            letter-spacing: 0.01em;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.06); border-color: rgba(255, 255, 255, 0.18); }
        .btn:active { transform: translateY(1px); }
        .btn.primary { background: var(--accent-dim); border-color: rgba(122, 223, 255, 0.4); color: var(--accent); }
        .btn.primary:hover { background: rgba(122, 223, 255, 0.28); }
        .btn.danger { color: var(--danger); border-color: rgba(255, 107, 107, 0.3); }
        .btn.danger:hover { background: rgba(255, 107, 107, 0.1); }
        .btn .kbd {
            color: var(--text-faint);
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            padding: 1px 5px;
            border: 1px solid var(--line-strong);
            border-radius: 4px;
            margin-left: 2px;
        }

        #file-input { display: none; }

        /* ---------- Sidebar (Layers) ---------- */
        #sidebar {
            grid-area: sidebar;
            border-right: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(13, 18, 24, 0.6), rgba(7, 9, 13, 0.6));
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex; flex-direction: column;
            min-height: 0;
        }
        .sidebar-section {
            padding: 14px 14px 8px;
            border-bottom: 1px solid var(--line);
        }
        .section-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-faint);
            margin: 0 0 10px;
            font-weight: 700;
        }
        .add-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .add-grid .btn { width: 100%; justify-content: center; padding: 9px 6px; }

        #layers {
            flex: 1;
            overflow-y: auto;
            padding: 10px 8px;
            min-height: 0;
        }
        .layer-row {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-dim);
            font-size: 12px;
            transition: background .12s ease, color .12s ease;
            border: 1px solid transparent;
        }
        .layer-row:hover { background: rgba(255, 255, 255, 0.04); color: var(--text); }
        .layer-row.selected {
            background: var(--accent-dim);
            color: var(--accent);
            border-color: rgba(122, 223, 255, 0.35);
        }
        .layer-row .icon { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.8; }
        .layer-row .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .layer-row .del {
            color: var(--text-faint);
            background: transparent;
            border: 0; cursor: pointer;
            padding: 2px 6px; border-radius: 4px;
            font-size: 12px;
        }
        .layer-row .del:hover { color: var(--danger); background: rgba(255, 107, 107, 0.12); }
        .empty-hint {
            color: var(--text-faint);
            font-size: 12px;
            padding: 14px 10px;
            text-align: center;
            line-height: 1.5;
        }

        /* ---------- Workspace ---------- */
        #workspace-wrap {
            grid-area: workspace;
            position: relative;
            overflow: hidden;
            min-width: 0;
            min-height: 0;
        }
        #workspace {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: -1px -1px;
        }

        .draggable {
            position: absolute;
            cursor: grab;
            display: inline-block;
            isolation: isolate;
            box-sizing: border-box;
            touch-action: none;
        }
        .draggable:active { cursor: grabbing; }
        .draggable.active { outline: 1px dashed rgba(122, 223, 255, 0.5); outline-offset: 8px; }

        .obj-text {
            font-size: 96px;
            font-weight: 900;
            color: var(--obj);
            white-space: nowrap;
            line-height: 1;
            padding: 12px;
            letter-spacing: -0.02em;
        }
        .obj-button {
            background: var(--obj);
            color: #c9d1d9;
            border: 2px solid var(--obj-border);
            padding: 16px 42px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-family: inherit;
        }
        .obj-svg { width: 220px; height: 220px; color: var(--obj); }
        .obj-svg svg { width: 100%; height: 100%; display: block; }

        /* ---------- lil-gui overrides ---------- */
        .lil-gui.root {
            --background-color: rgba(13, 18, 24, 0.92);
            --text-color: var(--text);
            --title-background-color: rgba(7, 9, 13, 0.7);
            --title-text-color: var(--text);
            --widget-color: #1a2330;
            --hover-color: #243042;
            --focus-color: #2c3a4f;
            --number-color: var(--accent);
            --string-color: #b0e8a6;
            --font-size: 12px;
            --input-font-size: 12px;
            --font-family: 'Inter', system-ui, sans-serif;
            --font-family-mono: 'JetBrains Mono', monospace;
            --widget-border-radius: 4px;
            --checkbox-size: 12px;
            --scrollbar-width: 4px;

            position: fixed !important;
            top: 72px;
            right: 16px;
            max-height: calc(100vh - 220px);
            overflow-y: auto;
            border: 1px solid var(--line-strong);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 50;
        }

        /* ---------- Code panel ---------- */
        #codebar {
            grid-area: codebar;
            border-top: 1px solid var(--line);
            background: rgba(7, 9, 13, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: max-height .25s ease;
            max-height: 200px;
            overflow: hidden;
        }
        #codebar.collapsed { max-height: 38px; }
        .code-head {
            height: 38px;
            display: flex; align-items: center;
            padding: 0 14px;
            gap: 12px;
            border-bottom: 1px solid var(--line);
            cursor: pointer;
        }
        .code-head .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-faint);
            font-weight: 700;
        }
        .code-head .chev {
            margin-left: auto;
            color: var(--text-faint);
            transition: transform .2s ease;
        }
        #codebar.collapsed .chev { transform: rotate(180deg); }
        .code-body {
            display: flex;
            position: relative;
            height: 162px;
        }
        #code-output {
            margin: 0;
            padding: 14px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.55;
            color: #b3c1d1;
            overflow: auto;
            flex: 1;
            white-space: pre;
            user-select: text;
        }
        #code-output .tk-key { color: #ffd28e; }
        #code-output .tk-str { color: #b0e8a6; }
        #code-output .tk-num { color: var(--accent); }
        #code-output .tk-bool { color: #ff9eb5; }
        #code-output .tk-cmt { color: #4f5a68; font-style: italic; }
        #code-output .tk-fn { color: #c89cff; }
        .copy-btn {
            position: absolute;
            top: 10px; right: 12px;
            font-size: 10px;
            padding: 5px 10px;
        }

        /* ---------- Toast ---------- */
        #toast {
            position: fixed;
            bottom: calc(200px + 16px);
            left: 50%; transform: translateX(-50%) translateY(20px);
            background: rgba(20, 26, 35, 0.95);
            border: 1px solid var(--line-strong);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s ease, transform .2s ease;
            z-index: 1000;
            box-shadow: var(--shadow-md);
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ---------- Empty workspace state ---------- */
        .stage-hint {
            position: absolute;
            inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-faint);
            font-size: 13px;
            pointer-events: none;
            text-align: center;
            padding: 20px;
        }
        .stage-hint .kbd {
            color: var(--text-dim);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--line-strong);
            padding: 1px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            margin: 0 2px;
        }

        /* ---------- Scrollbars ---------- */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.16); }
        ::-webkit-scrollbar-track { background: transparent; }

        /* ---------- Mobile fallback ---------- */
        @media (max-width: 720px) {
            #app { grid-template-columns: 1fr; grid-template-areas: "topbar" "workspace" "codebar"; }
            #sidebar { display: none; }
            .lil-gui { right: 8px; top: 64px; }
        }
    </style>
</head>
<body>

<div id="ambient"><canvas id="ambient-canvas"></canvas></div>

<div id="app">

    <!-- TOPBAR -->
    <header id="topbar">
        <div class="brand">
            <div class="brand-mark" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v20M2 12h20M4.93 4.93l14.14 14.14M19.07 4.93L4.93 19.07"/>
                </svg>
            </div>
            <span class="brand-name">SnowCap.js</span>
            <span class="brand-ver" id="brand-ver">v2.0</span>
        </div>

        <div class="topbar-spacer"></div>

        <button class="btn" id="btn-preset"   title="Apply a preset to selected layer">Presets</button>
        <button class="btn" id="btn-export"   title="Copy code">Copy Code</button>
        <button class="btn danger" id="btn-reset" title="Reset workspace">Reset</button>
        <a class="btn" href="https://github.com/huecoder/snow-cap" target="_blank" rel="noopener" title="View source on GitHub">GitHub</a>
        <input type="file" id="file-input" accept=".svg">
    </header>

    <!-- SIDEBAR -->
    <aside id="sidebar">
        <div class="sidebar-section">
            <h2 class="section-title">Add Object</h2>
            <div class="add-grid">
                <button class="btn" data-spawn="text">+ Text <span class="kbd">T</span></button>
                <button class="btn" data-spawn="button">+ Button <span class="kbd">B</span></button>
                <button class="btn" data-spawn="snowflake">+ Snowflake</button>
                <button class="btn" data-spawn="mountain">+ Mountain</button>
                <button class="btn" data-spawn="house">+ House</button>
                <button class="btn" data-spawn="import">+ Import SVG</button>
            </div>
        </div>
        <div class="sidebar-section" style="flex:1;display:flex;flex-direction:column;border-bottom:0;padding-bottom:0;min-height:0;">
            <h2 class="section-title">Layers</h2>
            <div id="layers"></div>
        </div>
    </aside>

    <!-- WORKSPACE -->
    <main id="workspace-wrap">
        <div id="workspace"></div>
        <div class="stage-hint" id="stage-hint">
            Click <span class="kbd">+ Text</span> or press <span class="kbd">T</span> to begin. Drag objects to reposition.
        </div>
    </main>

    <!-- CODE PANEL -->
    <section id="codebar">
        <div class="code-head" id="code-head">
            <span class="label">Generated Code</span>
            <span class="chev" aria-hidden="true">▾</span>
        </div>
        <div class="code-body">
            <pre id="code-output">// Add an object to start...</pre>
            <button class="btn copy-btn" id="copy-btn">Copy</button>
        </div>
    </section>

</div>

<div id="toast"></div>

<script>
(function () {
    'use strict';

    document.getElementById('brand-ver').textContent = 'v' + (SnowCap.version || '2.0');

    // ---------- Ambient falling snow background ----------
    (function ambientSnow() {
        const cvs = document.getElementById('ambient-canvas');
        const ctx = cvs.getContext('2d');
        let flakes = [];
        function resize() {
            cvs.width = window.innerWidth;
            cvs.height = window.innerHeight;
            const N = Math.floor((cvs.width * cvs.height) / 18000);
            flakes = [];
            for (let i = 0; i < N; i++) {
                flakes.push({
                    x: Math.random() * cvs.width,
                    y: Math.random() * cvs.height,
                    r: 0.6 + Math.random() * 1.6,
                    vy: 0.15 + Math.random() * 0.5,
                    vx: -0.15 + Math.random() * 0.3,
                    a: 0.25 + Math.random() * 0.45
                });
            }
        }
        resize();
        window.addEventListener('resize', resize);
        function tick() {
            ctx.clearRect(0, 0, cvs.width, cvs.height);
            for (const f of flakes) {
                f.y += f.vy;
                f.x += f.vx;
                if (f.y > cvs.height + 4) { f.y = -4; f.x = Math.random() * cvs.width; }
                if (f.x < -4) f.x = cvs.width + 4;
                if (f.x > cvs.width + 4) f.x = -4;
                ctx.beginPath();
                ctx.fillStyle = 'rgba(255,255,255,' + f.a + ')';
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                ctx.fill();
            }
            requestAnimationFrame(tick);
        }
        tick();
    })();

    // ---------- Toast ----------
    const toastEl = document.getElementById('toast');
    let toastTO = null;
    function toast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        clearTimeout(toastTO);
        toastTO = setTimeout(() => toastEl.classList.remove('show'), 1600);
    }

    // ---------- Drag state ----------
    const DragState = {
        target: null,
        snow: null,
        offX: 0, offY: 0,
        active: false,
        moved: false
    };

    // ---------- App state ----------
    const workspace = document.getElementById('workspace');
    const stageHint = document.getElementById('stage-hint');
    const layersEl  = document.getElementById('layers');
    const objects = []; // { id, el, snow, label, kind }
    let nextId = 1;
    let activeObj = null;
    let gui = null;

    // Built-in SVG icons
    const ICONS = {
        snowflake: `<svg viewBox="0 0 100 100"><g stroke="currentColor" stroke-width="6" stroke-linecap="round" fill="none">
            <line x1="50" y1="6"  x2="50" y2="94"/>
            <line x1="6"  y1="50" x2="94" y2="50"/>
            <line x1="18" y1="18" x2="82" y2="82"/>
            <line x1="82" y1="18" x2="18" y2="82"/>
            <polyline points="40,12 50,22 60,12"/>
            <polyline points="40,88 50,78 60,88"/>
            <polyline points="12,40 22,50 12,60"/>
            <polyline points="88,40 78,50 88,60"/>
        </g></svg>`,
        mountain: `<svg viewBox="0 0 200 140" preserveAspectRatio="none"><polygon points="0,140 60,40 95,90 130,20 200,140"/></svg>`,
        house: `<svg viewBox="0 0 200 160"><polygon points="20,80 100,20 180,80 180,150 20,150"/><rect x="80" y="100" width="40" height="50" fill="#000" fill-opacity="0.25"/></svg>`
    };

    // ---------- Spawning ----------
    function spawnText(text) {
        const el = document.createElement('div');
        el.className = 'draggable obj-text';
        el.innerText = text || 'WINTER';
        return registerObj(el, 'text', el.innerText);
    }
    function spawnButton(text) {
        const el = document.createElement('div');
        el.className = 'draggable obj-button';
        el.innerText = text || 'SUBMIT';
        return registerObj(el, 'button', el.innerText);
    }
    function spawnSvg(svgMarkup, label) {
        const el = document.createElement('div');
        el.className = 'draggable obj-svg';
        el.innerHTML = svgMarkup;
        const svg = el.querySelector('svg');
        if (svg) {
            // Let CSS `.obj-svg { color: var(--obj) }` drive shape color via
            // currentColor — works for both fill="currentColor" and
            // stroke="currentColor" markup. We default any element with no
            // explicit fill to currentColor so plain user SVGs still render.
            svg.querySelectorAll('*').forEach(n => {
                if (!n.getAttribute('fill') && !n.style.fill && n.tagName !== 'g') {
                    n.setAttribute('fill', 'currentColor');
                }
            });
        }
        return registerObj(el, 'svg', label || 'SVG');
    }
    function registerObj(el, kind, label) {
        // Place near center-ish, with some scatter
        const wsW = workspace.clientWidth, wsH = workspace.clientHeight;
        el.style.left = Math.max(20, Math.round(wsW * 0.5 - 200 + (Math.random() - 0.5) * 120)) + 'px';
        el.style.top  = Math.max(20, Math.round(wsH * 0.5 - 100 + (Math.random() - 0.5) * 80)) + 'px';

        el.addEventListener('pointerdown', onPointerDown);
        workspace.appendChild(el);

        const snow = new SnowCap(el);
        const id = nextId++;
        const obj = { id, el, snow, label, kind };
        objects.push(obj);
        renderLayers();
        select(obj);
        stageHint.style.display = 'none';
        return obj;
    }

    // ---------- Pointer drag ----------
    function onPointerDown(e) {
        if (e.target.closest('.lil-gui')) return;
        const el = e.currentTarget;
        const obj = objects.find(o => o.el === el);
        if (!obj) return;
        DragState.target = el;
        DragState.snow = obj.snow;
        DragState.offX = el.offsetLeft - e.clientX;
        DragState.offY = el.offsetTop  - e.clientY;
        DragState.active = true;
        DragState.moved = false;
        el.setPointerCapture && el.setPointerCapture(e.pointerId);
        el.style.cursor = 'grabbing';
        select(obj);
    }
    window.addEventListener('pointermove', (e) => {
        if (!DragState.active) return;
        e.preventDefault();
        DragState.moved = true;
        const t = DragState.target;
        if (!t) return;
        requestAnimationFrame(() => {
            t.style.left = (e.clientX + DragState.offX) + 'px';
            t.style.top  = (e.clientY + DragState.offY) + 'px';
        });
    }, { passive: false });
    window.addEventListener('pointerup', () => {
        if (!DragState.active) return;
        DragState.active = false;
        if (DragState.target) DragState.target.style.cursor = 'grab';
        // No need to refresh — element didn't change shape, only position. Snow is anchored to the element.
        DragState.target = null;
        DragState.snow = null;
    });

    // ---------- Selection / GUI ----------
    function select(obj) {
        if (activeObj && activeObj.el) activeObj.el.classList.remove('active');
        activeObj = obj;
        if (obj && obj.el) obj.el.classList.add('active');
        renderLayers();
        rebuildGui();
        updateCode();
    }

    function rebuildGui() {
        if (gui) { gui.destroy(); gui = null; }
        if (!activeObj) return;
        const o = activeObj.snow.options;
        gui = new lil.GUI({ title: 'Snow Settings — ' + activeObj.label, width: 280 });

        const apply = () => { activeObj.snow.update({}); updateCode(); };

        const fGeo = gui.addFolder('Shape');
        fGeo.add(o, 'size', 2, 50, 1).name('Size (px)').onChange(apply);
        fGeo.add(o, 'height', 0.2, 2.0, 0.05).name('Height ratio').onChange(apply);
        fGeo.add(o, 'density', 0.1, 1.0, 0.05).name('Density').onChange(apply);
        fGeo.add(o, 'bias', 0, 1.0, 0.05).name('Dome bias').onChange(apply);
        fGeo.add(o, 'edgePadding', 0, 20, 1).name('Edge padding').onChange(apply);
        fGeo.add(o, 'maxAngle', 0, 90, 1).name('Max slope (°)').onChange(apply);
        fGeo.add(o, 'roughness', 0, 10, 0.5).name('Roughness').onChange(apply);
        fGeo.add(o, 'offsetY', -50, 50, 1).name('Y offset').onChange(apply);
        fGeo.add(o, 'wind', -1, 1, 0.05).name('Wind lean').onChange(apply);

        const fLook = gui.addFolder('Look');
        fLook.addColor(o, 'color').name('Color').onChange(apply);
        fLook.add(o, 'blur', 0, 20, 0.5).name('Softness').onChange(apply);
        fLook.add(o, 'shadow').name('Drop shadow').onChange(apply);

        const fFx = gui.addFolder('Effects');
        fFx.add(o, 'icicles', 0, 1, 0.05).name('Icicles').onChange(apply);
        fFx.add(o, 'icicleLength', 4, 60, 1).name('Icicle length').onChange(apply);
        fFx.add(o, 'sparkle').name('Sparkles').onChange(apply);
        fFx.add(o, 'sparkleCount', 0, 30, 1).name('Sparkle count').onChange(apply);
        fFx.addColor(o, 'sparkleColor').name('Sparkle color').onChange(apply);

        const fAdv = gui.addFolder('Advanced');
        fAdv.add(o, 'seed', 0, 1000, 1).name('Seed').onChange(apply);
        fAdv.add(o, 'resolution', 1, 8, 1).name('Resolution').onChange(apply);
        fAdv.add(o, 'threshold', 1, 254, 1).name('Alpha threshold').onChange(apply);
        fAdv.add(o, 'autoResize').name('Auto-resize');
        fAdv.close();
    }

    // ---------- Layers ----------
    function renderLayers() {
        layersEl.innerHTML = '';
        if (!objects.length) {
            const e = document.createElement('div');
            e.className = 'empty-hint';
            e.textContent = 'No objects yet.';
            layersEl.appendChild(e);
            return;
        }
        objects.forEach(obj => {
            const row = document.createElement('div');
            row.className = 'layer-row' + (obj === activeObj ? ' selected' : '');
            row.innerHTML =
                '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                (obj.kind === 'text' ? '<polyline points="4 7 4 5 20 5 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="5" x2="12" y2="20"/>' :
                 obj.kind === 'button' ? '<rect x="3" y="9" width="18" height="6" rx="3"/>' :
                 '<polyline points="3 17 9 11 13 15 21 7"/>') +
                '</svg>' +
                '<span class="name">' + escapeHtml(obj.label) + '</span>' +
                '<button class="del" title="Delete">×</button>';
            row.addEventListener('click', (e) => {
                if (e.target.closest('.del')) return;
                select(obj);
            });
            row.querySelector('.del').addEventListener('click', (e) => {
                e.stopPropagation();
                removeObj(obj);
            });
            layersEl.appendChild(row);
        });
    }
    function removeObj(obj) {
        const i = objects.indexOf(obj);
        if (i === -1) return;
        try { obj.snow.destroy(); } catch (_) {}
        if (obj.el && obj.el.parentNode) obj.el.parentNode.removeChild(obj.el);
        objects.splice(i, 1);
        if (activeObj === obj) activeObj = objects[objects.length - 1] || null;
        if (!objects.length) stageHint.style.display = '';
        renderLayers();
        rebuildGui();
        updateCode();
    }
    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    // ---------- Code panel ----------
    const codeOut = document.getElementById('code-output');
    function updateCode() {
        if (!activeObj) {
            codeOut.textContent = '// Add an object to start...';
            return;
        }
        const opts = diffOptions(activeObj.snow.options);
        const selector = '.' + (activeObj.el.classList[1] || 'your-element');
        const src =
            '// Apply SnowCap to your element\n' +
            'const snow = new SnowCap(' + JSON.stringify(selector) + ', ' + stringifyJs(opts) + ');';
        codeOut.innerHTML = highlight(src);
    }
    function diffOptions(opts) {
        const out = {};
        for (const k in SnowCap.defaults) {
            if (k === 'seed') continue; // seed is auto-generated; keep it out unless user pinned a value
            if (Object.prototype.hasOwnProperty.call(opts, k) && opts[k] !== SnowCap.defaults[k]) {
                out[k] = opts[k];
            }
        }
        return out;
    }
    function stringifyJs(obj) {
        const keys = Object.keys(obj);
        if (!keys.length) return '{}';
        const lines = keys.map(k => '    ' + k + ': ' + JSON.stringify(obj[k]));
        return '{\n' + lines.join(',\n') + '\n}';
    }
    function highlight(src) {
        // Single-pass tokenizer. Each match is consumed once, so highlighters
        // never re-match each other's output (e.g. the number regex won't see
        // digits inside an inserted span class name).
        return src.replace(
            /(\/\/[^\n]*)|("(?:\\.|[^"\\])*")|('(?:\\.|[^'\\])*')|\b(true|false|null)\b|\b(new)\s+([A-Z][\w]*)|(-?\d+(?:\.\d+)?)|^([ \t]*)([a-zA-Z_$][\w$]*)(:)|([&<>])/gm,
            function (m, cmt, dstr, sstr, bool, _new, fn, num, sp, key, col, esc) {
                if (cmt)  return '<span class="tk-cmt">' + escapeHtml(cmt)  + '</span>';
                if (dstr) return '<span class="tk-str">' + escapeHtml(dstr) + '</span>';
                if (sstr) return '<span class="tk-str">' + escapeHtml(sstr) + '</span>';
                if (bool) return '<span class="tk-bool">' + bool + '</span>';
                if (_new) return _new + ' <span class="tk-fn">' + fn + '</span>';
                if (num)  return '<span class="tk-num">' + num + '</span>';
                if (key)  return sp + '<span class="tk-key">' + key + '</span>' + col;
                if (esc)  return escapeHtml(esc);
                return m;
            }
        );
    }

    document.getElementById('copy-btn').addEventListener('click', copyCode);
    document.getElementById('btn-export').addEventListener('click', copyCode);
    function copyCode() {
        const text = codeOut.innerText;
        navigator.clipboard.writeText(text).then(
            () => toast('Code copied to clipboard'),
            () => toast('Copy failed — select & copy manually')
        );
    }

    // Collapse code panel
    document.getElementById('code-head').addEventListener('click', () => {
        document.getElementById('codebar').classList.toggle('collapsed');
    });

    // ---------- Toolbar buttons ----------
    document.getElementById('btn-reset').addEventListener('click', () => {
        if (!objects.length) return;
        if (!confirm('Remove all objects?')) return;
        // Remove a copy since removeObj mutates the array
        objects.slice().forEach(removeObj);
    });

    document.querySelectorAll('[data-spawn]').forEach(btn => {
        btn.addEventListener('click', () => {
            const k = btn.getAttribute('data-spawn');
            if (k === 'text') spawnText('WINTER');
            else if (k === 'button') spawnButton('SUBMIT');
            else if (k === 'snowflake') spawnSvg(ICONS.snowflake, 'Snowflake');
            else if (k === 'mountain') spawnSvg(ICONS.mountain, 'Mountain');
            else if (k === 'house') spawnSvg(ICONS.house, 'House');
            else if (k === 'import') document.getElementById('file-input').click();
        });
    });

    document.getElementById('file-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => spawnSvg(ev.target.result, file.name.replace(/\.svg$/i, ''));
            reader.readAsText(file);
        }
        e.target.value = '';
    });

    // ---------- Presets ----------
    const PRESETS = {
        'Light Dust':   { size: 8,  density: 0.7, blur: 2,  bias: 0.4, roughness: 2, sparkle: false, icicles: 0,    wind: 0 },
        'Heavy Snow':   { size: 18, density: 1.0, blur: 4,  bias: 0.3, roughness: 4, sparkle: false, icicles: 0,    wind: 0 },
        'Frosty':       { size: 6,  density: 1.0, blur: 1,  bias: 0.6, roughness: 1, sparkle: true,  sparkleCount: 14, icicles: 0, wind: 0 },
        'Fluffy Caps':  { size: 22, density: 0.95,blur: 6,  bias: 0.55, roughness: 5, sparkle: false, icicles: 0,    wind: 0 },
        'Icy Edge':     { size: 10, density: 0.9, blur: 2,  bias: 0.3, roughness: 2, sparkle: true,  sparkleCount: 6,  icicles: 0.6, icicleLength: 22, wind: 0 },
        'Windswept':    { size: 14, density: 0.85,blur: 3,  bias: 0.5, roughness: 3, sparkle: false, icicles: 0,    wind: 0.6 },
        'Festive':      { size: 14, density: 1.0, blur: 3,  bias: 0.45, roughness: 3, sparkle: true,  sparkleCount: 18, sparkleColor: '#ffe89e', icicles: 0.3, icicleLength: 16, wind: 0 }
    };
    document.getElementById('btn-preset').addEventListener('click', () => {
        if (!activeObj) { toast('Select a layer first'); return; }
        const names = Object.keys(PRESETS);
        const cur = activeObj._presetIdx || 0;
        const next = (cur + 1) % names.length;
        activeObj._presetIdx = next;
        const name = names[next];
        activeObj.snow.update(PRESETS[name]);
        rebuildGui();
        updateCode();
        toast('Preset: ' + name);
    });

    // ---------- Keyboard shortcuts ----------
    window.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
        if (e.metaKey || e.ctrlKey) return;
        const k = e.key.toLowerCase();
        if (k === 't') { e.preventDefault(); spawnText('WINTER'); }
        else if (k === 'b') { e.preventDefault(); spawnButton('SUBMIT'); }
        else if (k === 'delete' || k === 'backspace') {
            if (activeObj) { e.preventDefault(); removeObj(activeObj); }
        } else if (k === 'p') {
            e.preventDefault();
            document.getElementById('btn-preset').click();
        }
    });

    // ---------- Initial state ----------
    spawnText('WINTER');

    // Re-render all snow on window resize (debounced) — autoResize on each instance handles size changes
    let resizeRaf = null;
    window.addEventListener('resize', () => {
        if (resizeRaf) cancelAnimationFrame(resizeRaf);
        resizeRaf = requestAnimationFrame(() => objects.forEach(o => o.snow.refresh()));
    });

})();
</script>
</body>
</html>
